aid: rivos
name: Rivos
description: >-
  Rivos is a Santa Clara-based silicon startup founded in 2021 that designs
  data-center class GPUs and AI accelerators around the open RISC-V
  instruction set architecture, fabricated on TSMC's 3nm process. The company
  is also developing a CUDA-to-RISC-V translation layer to ease migration of
  Nvidia-based AI workloads onto its silicon. Rivos raised a 250 million
  dollar Series A in 2024 led by Matrix Capital Management with Walden
  Catalyst and Dell Capital Partners, followed by additional rounds bringing
  total funding above 370 million dollars at a valuation north of 2 billion
  dollars. In October 2025 Meta announced an agreement to acquire Rivos to
  bolster its in-house custom silicon program. The company has operated in
  near-stealth mode and currently exposes no public website content, SDKs,
  or APIs, so this profile is intentionally an empty apis list with
  external press and acquisition references.
